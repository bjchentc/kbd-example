######################################
# Input KBD (Keyboard Scan)
######################################
CONFIG_INPUT=y
CONFIG_KSCAN=y
CONFIG_INPUT_ITE_IT8XXX2_KBD=y
CONFIG_INPUT_ITE_IT513XX_KBD=n

######################################
# PM options for KBD
######################################
CONFIG_PM=y
CONFIG_PM_DEVICE=n
CONFIG_PM_DEVICE_RUNTIME=n
CONFIG_SYS_CLOCK_TICKS_PER_SEC=32768
######################################
# Enabling Event
######################################
CONFIG_EVENTS=y

############### Logging #######################
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_ITE_EC_KBD_DBG=y
CONFIG_ITE_KBD_HOOK_EVENT_THREAD=y
############ Optimization Option ###########
CONFIG_SPEED_OPTIMIZATIONS=y
